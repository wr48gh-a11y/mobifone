ormance AI compute anywhere in the world.",[],{"title":66,"description":73},[67,70],{"type":55,"text":68,"spans":69,"direction":24},"Verified at every read. ",[],{"type":55,"text":71,"spans":72,"direction":24},"Provenance built in.",[],[74],{"type":21,"text":75,"spans":76,"direction":24},"Every object on Shelby carries proof of what was stored, when, where from, and who has access. Not in a separate compliance tool. Not in a log you reconstruct later. In the data itself.",[],{"title":78,"description":88},[79,82,85],{"type":55,"text":80,"spans":81,"direction":24},"S3-compatible. ",[],{"type":55,"text":83,"spans":84,"direction":24},"Configurable. ",[],{"type":55,"text":86,"spans":87,"direction":24},"No lock-in.",[],[89],{"type":21,"text":90,"spans":91,"direction":24},"If your team runs S3 today, you already know how to use Shelby. Same APIs, same tools. Need more control? Placement groups define where your data lives. Custom RPC options define how it's served. Your data stays yours.",[],{"title":93,"description":97},[94],{"type":55,"text":95,"spans":96,"direction":24},"Egress that doesn't punish scale.",[],[98],{"type":21,"text":99,"spans":100,"direction":24},"With traditional cloud, the math stops working the moment AI enters your stack. Shelby's egress runs at a fraction of traditional cloud, and the bill doesn't double every time your usage does.",[],{"title":102,"description":109},[103,106],{"type":55,"text":104,"spans":105,"direction":24},"Enterprise-grade. ",[],{"type":55,"text":107,"spans":108,"direction":24},"No asterisk. ",[],[110],{"type":21,"text":111,"spans":112,"direction":24},"11 nines durability. 100+ Gbps throughput. Sub-second reads. The reliability and security you expect from the major clouds. The global reach, verifiability, and economics they can't offer. No tradeoffs.",[],[114],{"feature_text":115},[],"Cost Calculator",[118],{"type":21,"text":119,"spans":120,"direction":24},"Do you know what serving costs at AI scale?",[],[122],{"type":21,"text":123,"spans":124,"direction":24},"See what happens to your bill when AI workloads multiply your reads.",[],"The Architecture",[127,130],{"type":21,"text":128,"spans":129,"direction":24},"Three layers. One system. ",[],{"type":21,"text":131,"spans":132,"direction":24},"Built for the throughput and compliance demands of real AI workloads.",[],"Shelby Protocol Architecture","Read docs",[136],{"main_card_label":137,"left_card_label":138,"right_card_label":139,"top_card_label":140,"left_to_top_label":141,"top_to_left_label":145,"right_to_top_label":149,"top_to_right_label":153},"Verification and \nAudit Layer","Client\u2028SDK / CLI","Distributed \nStorage Nodes","RPC Edge\u2028Nodes",[142],{"type":21,"text":143,"spans":144,"direction":24},"(micro) payments",[],[146],{"type":21,"text":147,"spans":148,"direction":24},"Data\nRead/write",[],[150],{"type":21,"text":151,"spans":152,"direction":24},"Usage-based Payments",[],[154],{"type":21,"text":147,"spans":155,"direction":24},[],"https://shelby.xyz/whitepaper.pdf","EARLY ACCESS",[159],{"type":21,"text":160,"spans":161,"direction":24},"Shelby is open for Early Access ",[],"USE CASES",[164],{"type":21,"text":165,"spans":166,"direction":24},"One data layer. \nEvery side of the AI workflow.",[],[168,219,253],{"slide_tag":169,"slide_title":170,"slide_description":174,"slide_illustration":178,"slide_illustration_svg":194,"sliderillustration":195},"For AI Builders",[171],{"type":55,"text":172,"spans":173,"direction":24},"Move data globally. Pay a fraction of the cost.",[],[175],{"type":21,"text":176,"spans":177,"direction":24},"The better your system works, the more it costs to feed it. Training runs read across regions. Checkpoints sync across data centres. Sensor networks stream across continents. Trading infrastructure moves between facilities. Every successful workload scales into more reads, more egress, more cost. Traditional cloud rewards you for storing data, but it punishes you for using it.\n\n",[],{"dimensions":179,"alt"  18.317C6.88708 18.2283 6.98908 18.1522 7.12023 18.1504C7.25138 18.1486 7.35885 18.2192 7.35885 18.3098Z\" fill=\"#FFDFEF\"/>\n\u003Cpath d=\"M8.19678 18.1719C8.21317 18.2607 8.1221 18.353 7.99095 18.3748C7.8598 18.3965 7.74505 18.344 7.72865 18.257C7.71226 18.1701 7.80698 18.0759 7.93448 18.0524C8.06199 18.0288 8.18038 18.0832 8.19678 18.1719Z\" fill=\"#FFDFEF\"/>\n\u003C/g>\n\u003Cdefs>\n\u003CclipPath id=\"clip0_13056_2675\">\n\u003Crect width=\"22\" height=\"22\" fill=\"white\"/>\n\u003C/clipPath>\n\u003C/defs>\n\u003C/svg>","https://www.figma.com/community/file/1561449677738783672","https://docs.shelby.xyz/protocol",[343],{"left_text_label":344,"left_text_button_label":345,"left_button_url":346,"right_text_label":347,"right_text_button_label":348,"right_button_url":341},"Build with Shelby","Request Access","https://developers.shelby.xyz/","See how it works","Read the docs",[],"Shelby | Global Object Storage for AI","Shelby stores your data and delivers it to AI, anywhere in the world",{"dimensions":353,"alt":6,"copyright":6,"url":356,"id":357,"edit":358},{"width":354,"height":355},2400,1260,"https://images.prismic.io/shelby/aFO7XbNJEFaPYFyW_meta-img.png?auto=format,compress&rect=0,0,2400,1260&w=2400&h=1260","aFO7XbNJEFaPYFyW",{"x":185,"y":185,"zoom":186,"background":187},[360,510,676,699,722,742,764,784,805,827,849,871,892,913,934],{"id":361,"uid":362,"url":6,"type":363,"href":364,"tags":365,"first_publication_date":366,"last_publication_date":367,"slugs":368,"linked_documents":370,"lang":14,"alternate_languages":371,"data":372},"acbJbxIAACEAykQz","storage-layer-for-ai","article","https://shelby.cdn.prismic.io/api/v2/documents/search?ref=adUfXhIAACMA9ZGK&q=%5B%5B%3Ad+%3D+at%28document.id%2C+%22acbJbxIAACEAykQz%22%29+%5D%5D",[],"2026-03-27T18:57:13+0000","2026-03-31T19:41:19+0000",[369],"the-storage-layer-ai-needs-urgently",[],[],{"title":373,"date":377,"tags":378,"is_article":381,"external_link":6,"column_size":382,"is_reversed":218,"slices":383,"meta_title":6,"meta_description":6,"meta_image":509},[374],{"type":55,"text":375,"spans":376,"direction":24},"The Storage Layer AI Needs Urgently ",[],"2026-03-27",[379],{"label":380},"BLOG",true,"2-column",[384,427,452,473],{"variation":385,"version":386,"items":387,"primary":388,"id":425,"slice_type":426,"slice_label":6},"heading_left_text_right","initial",[],{"heading":389,"content":393},[390],{"type":55,"text":391,"spans":392,"direction":24},"by Pranav Raval, GM Shelby",[],[394,397,400,403,407,410,413,416,419,422],{"type":21,"text":395,"spans":396,"direction":24},"Walking the GTC floor, it was quite clear how AI is changing the infrastructure landscape.. The Neoclouds are doing a fantastic job stitching up new compute architectures at the rack scale - filling gaps the hyperscaler model has left open for some time. Their goal is simple: increase tokens per watt.  This improvement comes with highly optimized hardware software co-design for all stages of AI computation, including storage. The NVIDIA announcements backed it up - Vera Rubin, BlueField-4 STX, CMX, faster NVMe access, pod-level flash for KV cache, shared network storage at millisecond latency - almost every major launch is about moving data faster at the rack level",[],{"type":21,"text":398,"spans":399,"direction":24},"But that means storage is increasingly tied to compute. It needs high throughput network interconnects, specialized deployments like NVMe over fiber and flash storage.  ",[],{"type":21,"text":401,"spans":402,"direction":24},"While this storage layer is highly optimized for local use cases, it highlights obvious challenges in the deployment model.",[],{"type":404,"text":405,"spans":406,"direction":24},"list-item","Storage costs  $250 to $500 per TB making multi-PB deployments unfeasibly expensive",[],{"type":404,"text":408,"spans":409,"direction":24},"Frequent checkpoints on large scale training jobs can consume all available capacity.  ",[],{"type":404,"text":411,"spans":412,"direction":24},"Storage is local to racks or at best DC level with no cross-DC solutions. ",[],{"type":404,"text":414,"spans":415,"direction":24},"Bringing customer data to compute remains  a challenge. ",[],{"type":404,"text":417,"spans":418,"direction":24},"Hard allocation of customers to GPUs, directly impacts utilization, reduces economies of scale and prevents dynamic workload placement. ",[],{"type":21,"text":420,"spans":421,"direction":24},"Shelby is here to solve them all -  and we got a resounding validation at GTC. Let’s unpack.",[],{"type":21,"text":423,"spans":424,"direction":24},"First, let’s discuss why the current cloud model is broken.",[],"split_content$ed60b135-2ff7-49a3-8b78-2369b424fc85","split_content",{"variation":385,"version":386,"items":428,"primary":429,"id":451,"slice_type":426,"slice_label":6},[],{"heading":430,"content":434},[431],{"type":55,"text":432,"spans":433,"direction":24},"AI broke cloud storage",[],[435,438,445,448],{"type":21,"text":436,"spans":437,"direction":24},"Storage is local, but AI compute is global. Data collection happens all over the world, training happens where GPUs are available, inference happens closest to users. They are rarely the same data center, the same region, or the same provider.",[],{"type":21,"text":439,"spans":440,"direction":24},"AI workloads read 5 to 10 times more than they write, and they read across regions. The cloud storage stack was not built for this. You write your data once, and AI reads it a million times - but every cross-region read is an egress charge, every checkpoint sync is a transfer fee, and every training run that pulls data from a different facility compounds the bill. A single enterprise running 5PB/month pays north of $300K annually in egress alone, before all the hidden networking fees that never show up in the cost model.",[441],{"start":442,"end":443,"type":444},68,74,"em",{"type":21,"text":446,"spans":447,"direction":24},"Moving data isn't just expensive, it's slow and operationally complex. Teams spend precious engineering hours managing replicas across regions, maintaining cache layers for consistency, and building custom integrations just to keep data accessible where it's needed. Meanwhile, that data flows between actors and across borders with no verifiable record of what was accessed, by whom, or under what terms. ",[],{"type":21,"text":449,"spans":450,"direction":24},"The cloud  storage stack was built for a world where data stayed in one region. That world no longer exists. ",[],"split_content$c22611d4-41e7-49c6-9cb7-810b4126ecb9",{"variation":385,"version":386,"items":453,"primary":454,"id":472,"slice_type":426,"slice_label":6},[],{"heading":455,"content":459},[456],{"type":55,"text":457,"spans":458,"direction":24},"Everyone's patching solutions. Nobody's building the layer.",[],[460,463,466,469],{"type":21,"text":461,"spans":462,"direction":24},"Hyperscalers won't fix it - egress fees are a profit center, and the more you store with them, the more expensive it becomes to leave or even to access your own data from a different region. You’re locked in by design.",[],{"type":21,"text":464,"spans":465,"direction":24},"Neoclouds are building excellent GPU infrastructure, but data still has to get there, and when your training data sits in one data center while your inference cluster runs in another, local performance doesn't help with the transfer in between.",[],{"type":21,"text":467,"spans":468,"direction":24},"Decentralized storage has the right instinct - globally addressable, verifiable - but it relies on low-end hardware,  the public internet and high replication. This is ok for archival data but can't meet the throughput and latency that AI workloads demand.",[],{"type":21,"text":470,"spans":471,"direction":24},"The shared infrastructure layer that connects them has never existed, and businesses pay the price.",[],"split_content$85b36ab9-481a-4247-8006-a94b1cc6de4a",{"variation":385,"version":386,"items":474,"primary":475,"id":508,"slice_type":426,"slice_label":6},[],{"heading":476,"content":480},[477],{"type":55,"text":478,"spans":479,"direction":24},"One data layer. Every side of the AI workflow.",[],[481,484,487,490,493,496,499,502,505],{"type":21,"text":482,"spans":483,"direction":24},"Every AI training run connects an IP owner to an AI builder. Studios and publishers need to protect and monetize content that's being consumed at industrial scale. AI teams need to move data globally without egress destroying their margins or engineering hours draining their roadmap. And infrastructure providers need a storage layer they can offer customers without building from scratch or passing through hyperscaler fees.",[],{"type":21,"text":485,"spans":486,"direction":24},"These are different problems, but they all point to the same missing layer.",[],{"type":21,"text":488,"spans":489,"direction":24},"Shelby is global object storage built for how AI actually works - S3-compatible, so it drops into existing workflows, with one global namespace on a dedicated fiber backbone. Data stored in one region is readable in any other through the same path, with no regional copies, no replication overhead, and no transfer penalties.",[],{"type":21,"text":491,"spans":492,"direction":24},"That changes the economics. Egress runs roughly 70% lower than traditional cloud providers, and because there's no replication to manage, the engineering overhead disappears too. Your workloads scale. Your bill doesn't.",[],{"type":21,"text":494,"spans":495,"direction":24},"And every read returns cryptographic proof of what was served, when, from where, and under what rights - not in a separate compliance tool, and not in a log you reconstruct later, but in the data itself. The EU AI Act is in force and rights holders are suing over unlicensed content. This isn't optional anymore.",[],{"type":21,"text":497,"spans":498,"direction":24},"And none of this comes at the expense of performance - sub-second delivery, 100+ Gbps throughput, 11 nines durability. This is enterprise-grade infrastructure that happens to also be global, verifiable, and fundamentally cheaper.",[],{"type":21,"text":500,"spans":501,"direction":24},"So far, investment has flowed into one layer - optimizing inside the data centre. The space between them has remained unsolved, until now.",[],{"type":21,"text":503,"spans":504,"direction":24},"That's the layer Shelby is building.",[],{"type":21,"text":506,"spans":507,"direction":24},"Early Access is open. Come see what we're working on.",[],"split_content$6a1e046d-b1a3-4412-85a0-2e819bf9683a",{},{"id":511,"uid":512,"url":6,"type":363,"href":513,"tags":514,"first_publication_date":515,"last_publication_date":516,"slugs":517,"linked_documents":519,"lang":14,"alternate_languages":520,"data":521},"aaiFCBEAACIAYp7n","shelby-early-access","https://shelby.cdn.prismic.io/api/v2/documents/search?ref=adUfXhIAACMA9ZGK&q=%5B%5B%3Ad+%3D+at%28document.id%2C+%22aaiFCBEAACIAYp7n%22%29+%5D%5D",[],"2026-03-05T22:33:28+0000","2026-03-06T13:19:35+0000",[518],"shelby-early-access-is-live.-ai-demands-a-different-data-layer.-we-built-it.",[],[],{"title":522,"date":526,"tags":527,"is_article":381,"external_link":6,"column_size":382,"is_reversed":218,"slices":529,"meta_title":524,"meta_description":672,"meta_image":673},[523],{"type":55,"text":524,"spans":525,"direction":24},"Shelby Early Access Is Live. AI Demands a Different Data Layer. We Built It.",[],"2026-03-05",[528],{"label":380},[530,556,583,605,643],{"variation":385,"version":386,"items":531,"primary":532,"id":555,"slice_type":426,"slice_label":6},[],{"heading":533,"content":537},[534],{"type":55,"text":535,"spans":536,"direction":24},"Why we built Shelby",[],[538,541,543,551,553],{"type":21,"text":539,"spans":540,"direction":24},"Shelby is verifiable global object storage purpose-built for AI read workloads. Store data once, access it from any region through a single global namespace. No replication, no regional buckets, no routing stitched together after the fact. Egress costs are expected to run roughly 70% lower than traditional cloud providers. Every read can return a cryptographic receipt proving what was served, when, from where, and under what rights. Provenance at the storage layer, built in from the start.",[],{"type":21,"text":26,"spans":542,"direction":24},[],{"type":21,"text":544,"spans":545,"direction":24},"Early Access gives developers and AI teams the opportunity to integrate Shelby into real workloads on testnet, helping validate the platform ahead of full production, expected later in 2026. What's available on day one: S3-compatible APIs, cross-stack SDKs for React, Ethereum, Solana, the Shelby Media Kit for GenAI content distribution and delivery, AI agent tooling via the Shelby MCP Server and Shelby Skills, and full documentation.",[546],{"start":547,"end":548,"type":549,"data":550},423,436,"hyperlink",{"link_type":315,"url":341,"target":318},{"type":21,"text":26,"spans":552,"direction":24},[],{"type":21,"text":26,"spans":554,"direction":24},[],"split_content$93dbd514-db33-4c09-8431-64a0f7e35a12",{"variation":385,"version":386,"items":557,"primary":558,"id":582,"slice_type":426,"slice_label":6},[],{"heading":559,"content":563},[560],{"type":55,"text":561,"spans":562,"direction":24},"The infrastructure gap",[],[564,567,569,572,574,577,579],{"type":21,"text":565,"spans":566,"direction":24},"Most teams are focused on what AI can do for their product. Few are asking what it demands from their infrastructure. The moment you ship AI features, your data layer changes shape. One user action triggers dozens of background reads. Data gets copied across regions to keep latency down. Transfer costs climb. Compute sits idle, waiting on inputs you're overpaying to deliver.",[],{"type":21,"text":26,"spans":568,"direction":24},[],{"type":21,"text":570,"spans":571,"direction":24},"Traditional object storage was designed for a write-heavy world. AI inverts the pattern. A single retrieval call can fan out into dozens of reads across multiple datasets and regions. The default fix is replication: copy your data closer to compute, add a cache layer, manage consistency across copies, pay to store everything three or four times. Each fix solves the last thing that broke while creating the next one.",[],{"type":21,"text":26,"spans":573,"direction":24},[],{"type":21,"text":575,"spans":576,"direction":24},"Then there's provenance. The moment proprietary, licensed, or user-consented data enters a model's context, you need to prove what was served, when, and under what rights. Not logged after the fact. Proven at the point of delivery. Most teams handle this with a patchwork that holds until someone asks for proof.",[],{"type":21,"text":26,"spans":578,"direction":24},[],{"type":21,"text":580,"spans":581,"direction":24},"Two compounding problems. An economic model that penalizes the exact read pattern AI depends on, and a compliance architecture that gets harder to trust the more you scale.",[],"split_content$bf9c10bf-d5a0-4b49-b128-c13aa21efccd",{"variation":385,"version":386,"items":584,"primary":585,"id":604,"slice_type":426,"slice_label":6},[],{"heading":586,"content":590},[587],{"type":55,"text":588,"spans":589,"direction":24},"How Shelby solves it",[],[591,594,596,599,601],{"type":21,"text":592,"spans":593,"direction":24},"Shelby runs a single global namespace on DoubleZero’s dedicated fiber network. Write once, to one address. Readable from any region, same path, no replication. The duplication problem goes away because the architecture never creates it. Egress costs drop roughly 70% compared to traditional cloud providers.",[],{"type":21,"text":26,"spans":595,"direction":24},[],{"type":21,"text":597,"spans":598,"direction":24},"Provenance is built into the read path. Every object served can return a cryptographic receipt: what was delivered, when, from where, under what rights. Consent, attribution, and licensing terms travel with the object. Enforcement happens at the storage layer, not in a patchwork bolted on top. The compliance surface shrinks to match the data footprint. One copy, one address, one verifiable record on Aptos. ",[],{"type":21,"text":26,"spans":600,"direction":24},[],{"type":21,"text":602,"spans":603,"direction":24},"Organizations that can use proprietary and consented data compliantly will build specialized AI models their competitors can't replicate. That's the real unlock. Not cheaper storage. Access to the data that makes your model different from everyone else's.",[],"split_content$c7b61f39-4e80-4f93-9984-c1aa82269331",{"variation":385,"version":386,"items":606,"primary":607,"id":642,"slice_type":426,"slice_label":6},[],{"heading":608,"content":612},[609],{"type":55,"text":610,"spans":611,"direction":24},"Critical Infrastructure Partners ",[],[613,622,624,632,634],{"type":21,"text":614,"spans":615,"direction":24},"DoubleZero is the global fiber network built for distributed systems and the physical infrastructure that powers Shelby's global delivery through deterministic bandwidth, predictable routing, and low latency needed for AI object storage at global scale. By pairing Shelby's storage architecture with DoubleZero's network infrastructure, Shelby delivers predictable, high-throughput performance across regions. DoubleZero's network layer is a key part of how Shelby delivers on its promise: global, verifiable object storage where performance, reliability, and ownership coexist.",[616,620],{"start":185,"end":617,"type":549,"data":618},10,{"link_type":315,"url":619,"target":318},"https://doublezero.xyz",{"start":185,"end":617,"type":621},"strong",{"type":21,"text":26,"spans":623,"direction":24},[],{"type":21,"text":625,"spans":626,"direction":24},"Jump Crypto brings expertise in HPC-grade storage infrastructure built for the throughput demands of quantitative trading, one of the most read-intensive, latency-sensitive environments in enterprise computing. That foundation translates directly to AI workloads, where object retrieval patterns are unpredictable and performance degradation is not an option. By its contributions, Shelby leverages proven infrastructure designed to hold up under conditions that would break conventional cloud storage.",[627,631],{"start":185,"end":628,"type":549,"data":629},11,{"link_type":315,"url":630,"target":318},"https://jumpcrypto.com",{"start":185,"end":628,"type":621},{"type":21,"text":26,"spans":633,"direction":24},[],{"type":21,"text":635,"spans":636,"direction":24},"Aptos serves as the coordination and verification layer, providing onchain verifiability and a globally consistent control plane for data ownership, provenance, and rights enforcement. Every cryptographic receipt Shelby generates is anchored to Aptos, creating an immutable, auditable record of what was served, when, from where, and under what rights. As AI systems scale and regulatory scrutiny around data provenance intensifies, Aptos gives Shelby a verification layer that grows more reliable, not harder to trust, as the data footprint expands.",[637,641],{"start":185,"end":638,"type":549,"data":639},5,{"link_type":315,"url":640,"target":318},"https://aptosnetwork.com",{"start":185,"end":638,"type":621},"split_content$c3e2803f-2efc-4bf2-9c86-edb2ad7b505a",{"variation":385,"version":386,"items":644,"primary":645,"id":671,"slice_type":426,"slice_label":6},[],{"heading":646,"content":650},[647],{"type":55,"text":648,"spans":649,"direction":24},"Get started",[],[651,663],{"type":21,"text":652,"spans":653,"direction":24},"Early Access is open. Apply for Access today. First, join the Shelby Discord, then apply at developers.shelby.xyz",[654,658],{"start":655,"end":287,"type":549,"data":656},62,{"link_type":315,"url":657,"target":318},"https://discord.com/invite/shelbyserves",{"start":659,"end":660,"type":549,"data":661},92,113,{"link_type":315,"url":346,"target":662},"_self",{"type":21,"text":664,"spans":665,"direction":24},"Not ready to build yet? Sign up to stay informed as Shelby moves toward full production.",[666],{"start":667,"end":668,"type":549,"data":669},24,31,{"link_type":315,"url":670,"target":318},"https://shelby.xyz/#signup","split_content$2f28c18f-2704-4a3d-9e63-22bdc58c711f","Shelby is verifiable global object storage purpose-built for AI read workloads. Store data once, access it from any region through a single global namespace. No replication, no regional buckets, no routing stitched together after the fact.",{"dimensions":674,"alt":6,"copyright":6,"url":356,"id":357,"edit":675},{"width":354,"height":355},{"x":185,"y":185,"zoom":186,"background":187},{"id":677,"uid":678,"url":6,"type":363,"href":679,"tags":680,"first_publication_date":681,"last_publication_date":682,"slugs":683,"linked_documents":684,"lang":14,"alternate_languages":685,"data":686},"aPYCRBQAACcAeNNW","shelby-cost-modeling","https://shelby.cdn.prismic.io/api/v2/documents/search?ref=adUfXhIAACMA9ZGK&q=%5B%5B%3Ad+%3D+at%28document.id%2C+%22aPYCRBQAACcAeNNW%22%29+%5D%5D",[],"2025-10-20T09:36:29+0000","2025-11-27T07:10:47+0000",[678],[],[],{"title":687,"date":691,"tags":692,"is_article":218,"external_link":695,"column_size":696,"is_reversed":218,"slices":697,"meta_title":6,"meta_description":6,"meta_image":698},[688],{"type":55,"text":689,"spans":690,"direction":24},"Shelby Cost Modeling",[],"2025-10-16",[693],{"label":694},"ARTICLE","https://www-webflow.jumpcrypto.com/resources/shelby-cost-modeling","1-column",[],{},{"id":700,"uid":701,"url":6,"type":363,"href":702,"tags":703,"first_publication_date":704,"last_publication_date":705,"slugs":706,"linked_documents":708,"lang":14,"alternate_languages":709,"data":710},"aOzLxREAACIAsPFB","shelby-on-twitter--x-2-","https://shelby.cdn.prismic.io/api/v2/documents/search?ref=adUfXhIAACMA9ZGK&q=%5B%5B%3Ad+%3D+at%28document.id%2C+%22aOzLxREAACIAsPFB%22%29+%5D%5D",[],"2025-10-13T09:52:43+0000","2025-11-25T08:14:52+0000",[707],"its-time-to-challenge-the-cloud-monopoly.",[],[],{"title":711,"date":715,"tags":716,"is_article":218,"external
